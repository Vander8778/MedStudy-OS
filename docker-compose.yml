services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: file:/workspace/apps/backend/prisma/dev.db
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      S3_BUCKET: medstudy-local
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      HEALTH_DEEP_TOKEN: local-health-token
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/workspace/apps/backend/prisma
    depends_on:
      - redis
      - minio

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
    environment:
      NODE_ENV: development
      PORT: 3001
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
    ports:
      - "3000:3001"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2026-01-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  backend-data:
  minio-data:
