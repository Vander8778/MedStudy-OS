name: Deploy Staging

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Build and push backend image
        run: |
          docker build -f apps/backend/Dockerfile -t ghcr.io/${{ github.repository_owner }}/medstudy-backend:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/medstudy-backend:${{ github.sha }}
      - name: Build and push web-admin image
        run: |
          docker build -f apps/web-admin/Dockerfile -t ghcr.io/${{ github.repository_owner }}/medstudy-web-admin:${{ github.sha }} .
          docker push ghcr.io/${{ github.repository_owner }}/medstudy-web-admin:${{ github.sha }}
      - name: Configure SSH
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$STAGING_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      - name: Deploy on staging host
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no "$STAGING_SSH_USER@$STAGING_SSH_HOST" \
            "export BACKEND_IMAGE='ghcr.io/${{ github.repository_owner }}/medstudy-backend:${{ github.sha }}' && \
             export WEB_ADMIN_IMAGE='ghcr.io/${{ github.repository_owner }}/medstudy-web-admin:${{ github.sha }}' && \
             docker login ghcr.io -u '${{ github.actor }}' -p '${{ secrets.GITHUB_TOKEN }}' && \
             docker compose -f /srv/medstudy/docker-compose.yml pull backend-migrate backend web-admin && \
             (docker compose -f /srv/medstudy/docker-compose.yml stop backend || true) && \
             docker compose -f /srv/medstudy/docker-compose.yml run --rm backend-migrate && \
             docker compose -f /srv/medstudy/docker-compose.yml up -d"
      - name: Staging readiness smoke test
        if: ${{ vars.STAGING_BASE_URL != '' }}
        run: curl --fail --show-error "${{ vars.STAGING_BASE_URL }}/ready"
