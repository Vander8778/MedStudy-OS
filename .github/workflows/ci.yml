name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
      - "feature/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Migration safety check
        working-directory: apps/backend
        env:
          DATABASE_URL: file:./ci-migration-check.db
        run: |
          pnpm exec prisma migrate deploy --schema prisma/schema.prisma
          pnpm exec prisma migrate status --schema prisma/schema.prisma

  docker-build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build backend image
        run: docker build -f apps/backend/Dockerfile -t medstudy/backend:${{ github.sha }} .
      - name: Build web-admin image
        run: docker build -f apps/web-admin/Dockerfile -t medstudy/web-admin:${{ github.sha }} .
